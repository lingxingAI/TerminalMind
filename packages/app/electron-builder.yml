appId: com.terminalmind.app
productName: TerminalMind
directories:
  buildResources: build
npmRebuild: false
files:
  - out/**/*
  - package.json
  - node_modules/**/*
  - "!node_modules/@terminalmind/**"
  - "!node_modules/.pnpm/@terminalmind+*/**"
  - "!**/*.d.ts"
  - "!**/*.d.ts.map"
  - "!**/*.ts.map"
  - "!**/src/**"
  - "!**/__tests__/**"
  - "!**/.vscode/*"
asarUnpack:
  - "**/*.node"
  - "**/node-pty/**"
win:
  executableName: terminalmind
  signingHashAlgorithms: null
  sign: null
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: TerminalMind needs access to your Documents folder.
    - NSDownloadsFolderUsageDescription: TerminalMind needs access to your Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: terminalmind.dev
  category: Development
appImage:
  artifactName: ${name}-${version}.${ext}
