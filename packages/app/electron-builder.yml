appId: com.terminalmind.app
productName: TerminalMind
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.*"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}"
asarUnpack:
  - "**/*.node"
  - "**/node-pty/**"
win:
  executableName: terminalmind
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: TerminalMind needs access to your Documents folder.
    - NSDownloadsFolderUsageDescription: TerminalMind needs access to your Downloads folder.
  notarize: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - target: AppImage
      arch:
        - x64
  maintainer: terminalmind.dev
  category: Development
appImage:
  artifactName: ${name}-${version}.${ext}
